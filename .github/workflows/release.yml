name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-containers:
    name: Release (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [ glibc, musl, windows, fedora ]

    steps:
      - uses: actions/checkout@v6

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container
        run: podman build --target ${{ matrix.target }} -t azadi-${{ matrix.target }} .

      - name: Export artifacts
        run: |
          mkdir -p dist/${{ matrix.target }}
          podman create --name azadi-export azadi-${{ matrix.target }}
          podman cp azadi-export:/out/. dist/${{ matrix.target }}/
          podman rm azadi-export

      - name: Upload release assets
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: dist/${{ matrix.target }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows-native:
    name: Release (windows-native)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --workspace

      - name: Collect artifacts
        run: |
          mkdir dist\windows-native
          copy target\release\azadi.exe        dist\windows-native\
          copy target\release\azadi-macros.exe dist\windows-native\
          copy target\release\azadi-noweb.exe  dist\windows-native\

      - name: Upload release assets
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: dist/windows-native/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
