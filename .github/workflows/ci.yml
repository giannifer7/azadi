name: CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-containers:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [ glibc, musl, windows, fedora ]

    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container
        run: podman build --target ${{ matrix.target }} -t azadi-${{ matrix.target }} .

      - name: Export artifacts
        run: |
          mkdir -p dist/${{ matrix.target }}
          podman create --name azadi-export azadi-${{ matrix.target }}
          podman cp azadi-export:/out/. dist/${{ matrix.target }}/
          podman rm azadi-export

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azadi-${{ matrix.target }}
          path: dist/${{ matrix.target }}

  build-windows-native:
    name: Build (windows-native)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --workspace

      - name: Collect artifacts
        run: |
          mkdir dist\windows-native
          copy target\release\azadi.exe        dist\windows-native\
          copy target\release\azadi-macros.exe dist\windows-native\
          copy target\release\azadi-noweb.exe  dist\windows-native\

      - uses: actions/upload-artifact@v4
        with:
          name: azadi-windows-native
          path: dist/windows-native

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
